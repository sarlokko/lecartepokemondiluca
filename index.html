<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Carte Pokémon di Luca</title>

    <link rel="stylesheet" href="style.css">
    <script src="pokemon-list.js"></script>
</head>

<body>

    <div id="gen-menu" class="gen-menu">
        <button onclick="selectGen(1)">GEN 1</button>
        <button onclick="selectGen(2)">GEN 2</button>
        <button onclick="selectGen(3)">GEN 3</button>
        <button onclick="selectGen(4)">GEN 4</button>
        <button onclick="selectGen(5)">GEN 5</button>
        <button onclick="selectGen(6)">GEN 6</button>
        <button onclick="selectGen(7)">GEN 7</button>
        <button onclick="selectGen(8)">GEN 8</button>
        <button onclick="selectGen(9)">GEN 9</button>
    </div>

    <div style="position: relative; padding: 0 20px; margin-top: 60px;">
        <h1 id="gen-title" style="text-align: center; margin: 0;">Le Carte Pokémon di Luca</h1>

        <button id="qrSyncBtn" style="
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            padding: 8px 14px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        ">Aggiorna 🔄</button>
    </div>

    <div id="qrContainer" style="display:none; margin-top: 15px; text-align:center;">
        <p>Scansiona questo QR dal cellulare per sincronizzare i posseduti:</p>
        <div id="qrcode"></div>
    </div>

    <input type="text" id="search" placeholder="Cerca una carta...">

    <nav>
        <button onclick="showTab('home')" id="tab-home" class="active">Home</button>
        <button onclick="showTab('select')" id="tab-select">Seleziona</button>
        <button onclick="showTab('owned')" id="tab-owned">Possedute</button>
        <button onclick="showTab('missing')" id="tab-missing">Mancanti</button>
    </nav>

    <div id="home" class="tab">
        <div id="list-gen" class="list-container"></div>
    </div>

    <div id="select" class="tab" style="display:none;">
        <div id="list-select" class="list-container"></div>
    </div>

    <div id="owned" class="tab" style="display:none;">
        <div id="list-owned" class="list-container"></div>
    </div>

    <div id="missing" class="tab" style="display:none;">
        <div id="list-missing" class="list-container"></div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script>
        function showTab(tab) {
            document.querySelectorAll(".tab").forEach(t => t.style.display = "none");
            document.getElementById(tab).style.display = "block";

            document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
            document.getElementById("tab-" + tab).classList.add("active");

            if (tab === "select") renderSelect();
            if (tab === "owned") renderOwned();
            if (tab === "missing") renderMissing();
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Carte Pokémon di Luca</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
    <script src="pokemon-list.js"></script>
</head>
<body>
    <!-- TITOLO CENTRATO + QR A DESTRA -->
    <div style="position: relative; padding: 0 20px; margin-top: 10px;">
        <h1 style="text-align: center; margin: 0;">Le Carte Pokémon di Luca</h1>
        <button id="qrSyncBtn" style="
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            padding: 8px 14px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        ">Aggiorna 🔄</button>
    </div>
    <!-- QR CODE -->
    <div id="qrContainer" style="display:none; margin-top: 15px; text-align:center;">
        <p>Scansiona questo QR dal cellulare per sincronizzare i posseduti:</p>
        <div id="qrcode"></div>
    </div>
    <!-- RICERCA -->
    <input type="text" id="search" placeholder="Cerca una carta...">
    <!-- NAVIGAZIONE -->
    <nav>
        <button onclick="showTab('home')" id="tab-home" class="active">Home</button>
        <button onclick="showTab('select')" id="tab-select">Seleziona</button>
        <button onclick="showTab('owned')" id="tab-owned">Possedute</button>
        <button onclick="showTab('missing')" id="tab-missing">Mancanti</button>
        <button onclick="showTab('battle')" id="tab-battle">Lotte</button>
        <button onclick="showTab('megamax')" id="tab-megamax">Mega/Gigamax</button>
    </nav>
    <!-- TAB HOME -->
    <div id="home" class="tab">
        <div id="list-home" class="list-container"></div>
        <div id="pagination-home"></div>
    </div>
    <!-- TAB SELECT -->
    <div id="select" class="tab" style="display:none;">
        <div id="list-select" class="list-container"></div>
        <div id="pagination-select"></div>
    </div>
    <!-- TAB OWNED -->
    <div id="owned" class="tab" style="display:none;">
        <div id="list-owned" class="list-container"></div>
        <div id="pagination-owned"></div>
    </div>
    <!-- TAB MISSING -->
    <div id="missing" class="tab" style="display:none;">
        <div id="list-missing" class="list-container"></div>
        <div id="pagination-missing"></div>
    </div>
    <!-- TAB BATTLE (LOTTE) -->
    <div id="battle" class="tab" style="display:none;">
        <div style="text-align:center; margin-top:20px;">
            <button id="pickBtn" onclick="pickRandomBattlers()" style="
                padding:10px 18px;
                font-size:16px;
                background:#28a745;
                color:#fff;
                border:none;
                border-radius:6px;
                cursor:pointer;
            ">🎲 Scegli 2 Pokémon a caso</button>
        </div>
        <div id="battlePreview" style="display:flex; justify-content:center; gap:40px; margin-top:20px; flex-wrap:wrap;"></div>
        <div id="winnerChoice" style="display:none; text-align:center; margin-top:20px;">
            <p><strong>Chi vincerà?</strong></p>
            <select id="winnerSelect" style="font-size:16px; padding:6px;"></select>
            <br><br>
            <button onclick="runBattle()" style="
                padding:10px 18px;
                font-size:16px;
                background:#dc3545;
                color:#fff;
                border:none;
                border-radius:6px;
                cursor:pointer;
            ">⚔️ Lotta!</button>
        </div>
        <div id="battleResult" style="margin-top:25px;"></div>
    </div>
    <!-- TAB MEGA/GIGAMAX -->
    <div id="megamax" class="tab" style="display:none;">
        <div id="list-megagmax" class="list-container"></div>
    </div>

    <script src="script.js"></script>
    <script src="battle.js"></script>
    <script src="megamax.js"></script>

    <script>
        // === CAMBIO TAB ===
        function showTab(tab) {
            document.querySelectorAll(".tab").forEach(t => t.style.display = "none");
            document.getElementById(tab).style.display = "block";
            document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
            document.getElementById("tab-" + tab).classList.add("active");
            if (tab === "megamax" && !window.__megamaxLoaded) {
                window.__megamaxLoaded = true;
                renderMegaGmax();
            }
        }

        // === QR CODE ===
        // generateQRCode() è definita in script.js con codifica bitset compatta.
        // Qui gestiamo solo il click del bottone, rimuovendo eventuali listener duplicati.
        window.addEventListener("load", function () {
            const btn = document.getElementById("qrSyncBtn");
            const newBtn = btn.cloneNode(true);
            btn.parentNode.replaceChild(newBtn, btn);
            newBtn.addEventListener("click", function () {
                const box = document.getElementById("qrContainer");
                if (box.style.display === "none" || box.style.display === "") {
                    box.style.display = "block";
                    generateQRCode();
                } else {
                    box.style.display = "none";
                }
            });
        });
    </script>
</body>
</html>
